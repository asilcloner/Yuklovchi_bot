services:
  - type: web
    name: yuklovchi-bot
    env: python
    plan: free
    buildCommand: "python -m pip install --upgrade pip setuptools wheel && python -m pip install -r requirements.txt && python -m pip install -U yt-dlp"
    startCommand: "python bot.py"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.11
